# ── Service-role-Bearer functions (incompatible with sb_secret + verify_jwt=true) ──
# These compare inbound Authorization to `Bearer ${SUPABASE_SERVICE_ROLE_KEY}`. Under the new
# Publishable+Secret key model the platform-injected SUPABASE_SERVICE_ROLE_KEY is the
# sb_secret_* value, but the gateway's verify_jwt requires JWT format. Setting verify_jwt=false
# bypasses the gateway check; the function's own bearer comparison still authenticates.

[functions.generate-invoice-pdf]
